<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tested</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="container mt-5">
    <h1>Lista de tareas</h1>
    <h2>Ingreso tareass</h2>
    <section>
    <div class="row g-3">
        <div class="col-auto">
            <label for="staticEmail2" class="visually-hidden">Email</label>
            <input type="text" readonly class="form-control-plaintext" id="staticEmail2" value="Ingreso de Tareas">
        </div>
        <div class="col-auto">
            <label for="inputPassword2" class="visually-hidden">Tarea</label>
            <input type="text" class="form-control" id="txtTarea" placeholder="Ingresa Tarea">
        </div>
        <div class="col-auto">
            <button id="btnAgregar" type="button" class="btn btn-success">Agregar Tarea <i class="bi bi-plus-circle "></i></button>
        </div>
        <div class="col-auto">
            <button id="btnEditar" type="button" class="btn btn-secondary">Editar Tarea <i class="bi bi-pencil-square "></i></button>
        </div>
        <div class="col-auto">
            <button id="btnEliminar" type="button" class="btn btn-danger">Eliminar Tarea <i class="bi bi-x-circle" ></i></button>
        </div>
        <div class="col-auto">
            <button id="btnBuscar" type="button" class="btn btn-primary mb-3">Buscar Tarea <i class="bi bi-search "></i></button>
        </div>
    </div>
    <div class="card mt-5" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title">Tareas Existentes</h5>
            <ul id="listaTareas" class="list-group mt-5">
                    
            </ul>
        </div>
    </div>
  </section>
  <div class="modal" id="modalEditar" aria-labelledby="modalEditarLabel" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="modalEditarLabel"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="tarea_nueva" class="col-form-label">Nueva tarea</label>
                        <input type="text" class="form-control" id="tarea_nueva">
                    </div>
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnGuardar" class="btn btn-success bi bi-floppy"> Guardar</button>
            </div>
        </div>
    </div>
  </div>

  <div class="modal" id="modalEliminar" aria-labelledby="modalEliminarLabel" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="modalEliminarLabel"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <h3>¿Seguro de eliminar?</h3>
                    </div>
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnEliminar" class="btn btn-danger bi bi-x-circle"> Eliminar</button>
            </div>
        </div>
    </div>
  </div>
</form>
 <script src="js/lista_tareas.js"></script>
</body>
</html>
