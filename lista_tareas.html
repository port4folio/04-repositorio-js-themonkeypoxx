<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tested</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="container mt-5">
    <h1>Lista de tareas</h1>
    <h2>Ingreso tareass</h2>
    <section>
    <div class="row g-3">
        <div class="col-auto">
            <label for="staticEmail2" class="visually-hidden">Email</label>
            <input type="text" readonly class="form-control-plaintext" id="staticEmail2" value="Ingreso de Tareas">
        </div>
        <div class="col-auto">
            <label for="inputPassword2" class="visually-hidden">Tarea</label>
            <input type="text" class="form-control" id="txtTarea" placeholder="Ingresa Tarea">
        </div>
        <div class="col-auto">
            <button id="btnAgregar" type="button" class="btn btn-success">Agregar Tarea <i class="bi bi-plus-circle "></i></button>
        </div>
        <div class="col-auto">
            <button id="btnEditar" type="button" class="btn btn-secondary">Editar Tarea <i class="bi bi-pencil-square "></i></button>
        </div>
        <div class="col-auto">
            <button id="btnEliminar" type="button" class="btn btn-danger">Eliminar Tarea <i class="bi bi-x-circle" ></i></button>
        </div>
        <div class="col-auto">
            <button id="btnBuscar" type="button" class="btn btn-primary mb-3">Buscar Tarea <i class="bi bi-search "></i></button>
        </div>
    </div>
    <div class="card mt-5" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title">Tareas Existentes</h5>
            <ul id="listaTareas" class="list-group mt-5">
                    
            </ul>
        </div>
    </div>
  </section>
</form>
 <script src="js/lista_tareas.js"></script>
</body>
</html>
